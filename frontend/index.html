<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova - Simulación de Incorporación</title>
    <style>
      /* ═══════════ LOGIN OVERLAY ═══════════ */
      #user-login-overlay {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }

      #user-login-overlay.hidden {
        display: none;
      }

      .user-login-card {
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px;
        padding: 48px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 25px 60px -12px rgba(0,0,0,0.5);
        animation: ulSlideUp 0.6s cubic-bezier(0.16,1,0.3,1);
      }

      @keyframes ulSlideUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .user-login-logo {
        text-align: center;
        margin-bottom: 36px;
      }

      .user-login-logo .icon { font-size: 3.5rem; margin-bottom: 16px; }

      .user-login-logo h2 {
        color: #f8fafc;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.025em;
      }

      .user-login-logo p { color: #94a3b8; font-size: 0.95rem; margin-top: 8px; }

      .user-login-field { margin-bottom: 24px; }

      .user-login-field label {
        display: block;
        color: #cbd5e1;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .user-login-field input {
        width: 100%;
        padding: 14px 16px;
        background: rgba(15,23,42,0.4);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        color: #f8fafc;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        box-sizing: border-box;
      }

      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .password-wrapper input {
        width: 100%;
        padding-right: 45px;
      }

      .toggle-password-btn {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        color: #94a3b8;
        font-size: 1.1rem;
        cursor: pointer;
        padding: 8px;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toggle-password-btn:hover {
        color: #cbd5e1;
      }

      .user-login-field input::placeholder { color: #64748b; }

      .user-login-field input:focus {
        border-color: #4f46e5;
        background: rgba(15,23,42,0.6);
        box-shadow: 0 0 0 4px rgba(79,70,229,0.2);
      }

      #user-login-error {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.2);
        color: #fca5a5;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.9rem;
        margin-bottom: 24px;
        display: none;
      }

      #user-login-btn {
        width: 100%;
        padding: 14px;
        background: #4f46e5;
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        margin-top: 8px;
      }

      #user-login-btn:hover:not(:disabled) {
        background: #4338ca;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -10px #4f46e5;
      }

      #user-login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

      .user-login-footer {
        text-align: center;
        margin-top: 24px;
        color: #64748b;
        font-size: 0.85rem;
      }
    </style>
</head>
<body>
    <!-- ═══════════ LOGIN ═══════════ -->
    <div id="user-login-overlay">
      <div class="user-login-card">
        <div class="user-login-logo">
          <div class="icon">🏢</div>
          <h2>TechNova</h2>
          <p>Introduce tus credenciales para acceder</p>
        </div>

        <div id="user-login-error"></div>

        <form id="user-login-form">
          <div class="user-login-field">
            <label for="user-login-username">Usuario</label>
            <input type="text" id="user-login-username" placeholder="Introduce tu usuario"
                   autocomplete="username" required />
          </div>
          <div class="user-login-field">
            <label for="user-login-password">Contraseña</label>
            <div class="password-wrapper">
              <input type="password" id="user-login-password" placeholder="Introduce tu contraseña"
                     autocomplete="current-password" required />
              <button type="button" class="toggle-password-btn" id="toggle-password-btn" title="Mostrar/ocultar contraseña">👁️</button>
            </div>
          </div>
          <button type="submit" id="user-login-btn">Acceder</button>
        </form>

        <div class="user-login-footer">🔒 Acceso restringido</div>
      </div>
    </div>

    <!-- ═══════════ APP (se muestra tras login) ═══════════ -->
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
